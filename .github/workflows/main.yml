name: 极速编译 hello.ko (Android14-6.1)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取你的驱动代码
        uses: actions/checkout@v4

      - name: 安装编译环境
        run: |
          sudo apt update
          sudo apt install -y bc bison flex libssl-dev make gcc-aarch64-linux-gnu

      - name: 下载官方 GKI 内核编译组件
        run: |
          wget -O kernel.tar.gz https://github.com/topjohnwu/android-kernel-prebuilt/releases/download/android14-6.1/kernel.tar.gz
          tar -zxf kernel.tar.gz
          mv usr/src/kernel-6.1 kernel

      - name: 仅编译 ko 模块（超快）
        run: |
          make -C kernel \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            M=$PWD \
            modules

      - name: 上传编译好的 hello.ko
        uses: actions/upload-artifact@v4
        with:
          name: hello_ko
          path: ./*.ko
