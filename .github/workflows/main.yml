name: Android14-6.1-KO
on:
  workflow_dispatch: # 这个一定要在第 3 行，且顶格写

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Install repo
        run: |
          sudo curl https://googleapis.com > /usr/local/bin/repo
          sudo chmod a+x /usr/local/bin/repo
          git config --global user.email "you@example.com"
          git config --global user.name "Your Name"

      - name: Repo init kernel
        run: |
          mkdir -p android-kernel && cd android-kernel
          repo init -u https://googlesource.com -b common-android14-6.1 --depth=1
          repo sync -j$(nproc) --no-clone-bundle --no-tags

      - name: Add driver and create BUILD file
        run: |
          cd android-kernel
          mkdir -p common/drivers/hello
          
          # 如果你仓库根目录有 hello.c 就拷贝，没有就生成个简单的测试
          if [ -f "../hello.c" ]; then
            cp ../hello.c common/drivers/hello/
          else
            echo '#include <linux/module.h>\n#include <linux/kernel.h>\nMODULE_LICENSE("GPL");\nint init_module(void){printk("hello\\n");return 0;}\nvoid cleanup_module(void){}' > common/drivers/hello/hello.c
          fi

          echo "obj-m += hello.o" > common/drivers/hello/Kbuild

          # 必须创建这个 BUILD 文件，否则 bazel 报错
          cat <<EOF > common/drivers/hello/BUILD
load("//build/kernel/kleaf:kernel.bzl", "kernel_module")
kernel_module(
    name = "hello_module",
    srcs = glob(["**"]),
    outs = ["hello.ko"],
    kernel_build = "//common:kernel_aarch64",
)
EOF

      - name: Build only KO
        run: |
          cd android-kernel
          # 只编译这个模块，不编译整个内核，防止超时和磁盘满
          tools/bazel build --config=fast //common/drivers/hello:hello_module

      - name: Upload ko
        uses: actions/upload-artifact@v4
        with:
          name: hello-ko
          path: android-kernel/bazel-bin/common/drivers/hello/hello.ko
