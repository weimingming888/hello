name: 极速编译 hello.ko (Android14-6.1)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取你的代码
        uses: actions/checkout@v4

      - name: 安装编译工具
        run: |
          sudo apt update
          sudo apt install -y git bc bison flex libssl-dev make gcc-aarch64-linux-gnu

      - name: 下载 GKI 内核预编译头文件（超快）
        run: |
          git clone --depth=1 https://github.com/thankyou-android/android14-6.1-gki.git kernel

      - name: 极速编译 ko 模块
        run: |
          make -C kernel \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            M=$PWD \
            modules

      - name: 上传最终 ko 文件
        uses: actions/upload-artifact@v4
        with:
          name: hello_ko
          path: ./*.ko
