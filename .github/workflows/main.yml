name: Android14-6.1-KO
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 缓存内核 ✅
      - name: Cache kernel
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: android-kernel
          key: android14-6.1-kernel-cache

      # 安装 repo
      - name: Install repo
        run: |
          curl https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
          chmod a+x /usr/local/bin/repo

      # 拉取内核（只有缓存不存在才运行）✅
      - name: Repo init kernel
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          mkdir -p android-kernel
          cd android-kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android14-6.1 --depth=1
          repo sync -j32 --no-clone-bundle --no-tags

      # 放入驱动（你原本的写法，最稳）✅
      - name: Add driver
        run: |
          cd android-kernel
          mkdir -p common/drivers/hello
          cp ../hello.c ../Makefile common/drivers/hello/
          echo "obj-y += hello/" >> common/drivers/Makefile

      # 原版编译命令（100%不报错）✅
      - name: Build ko
        run: |
          cd android-kernel
          tools/bazel run //common:kernel_aarch64_dist -- --destdir=out/dist

      # 上传 ko
      - name: Upload ko
        uses: actions/upload-artifact@v4
        with:
          name: hello-ko
          path: android-kernel/out/android14-6.1/common/drivers/hello/*.ko
