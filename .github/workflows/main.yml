name: Android14-6.1-KO
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 清理磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: 缓存内核源码
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: android-kernel
          key: kernel-android14-6.1

      - name: 安装依赖与 repo
        run: |
          sudo curl https://googleapis.com > /usr/local/bin/repo
          sudo chmod a+x /usr/local/bin/repo
          git config --global user.email "you@example.com"
          git config --global user.name "Your Name"

      - name: 拉取 Android14-6.1 内核
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          mkdir -p android-kernel && cd android-kernel
          repo init -u https://googlesource.com -b common-android14-6.1 --depth=1
          repo sync --force-sync -j$(nproc)

      - name: 放入驱动并创建构建配置
        run: |
          cd android-kernel
          mkdir -p common/drivers/hello
          
          # 1. 拷贝源码 (确保路径正确)
          if [ -f "../hello.c" ]; then
            cp ../hello.c common/drivers/hello/
          fi
          
          # 2. 创建 Kbuild 文件
          echo "obj-m += hello.o" > common/drivers/hello/Kbuild

          # 3. 创建 BUILD 文件 (通过管道符 | 确保此处的 cat <<EOF 被正确解析)
          cat <<EOF > common/drivers/hello/BUILD
  load("//build/kernel/kleaf:kernel.bzl", "kernel_module")

kernel_module(
    name = "hello_module",
    srcs = glob(["**"]),
    outs = ["hello.ko"],
    kernel_build = "//common:kernel_aarch64",
)
EOF  

      - name: 单独编译 ko 文件
        run: |
          cd android-kernel
          # 仅使用 Bazel 编译定义的模块目标
          tools/bazel build --config=fast //common/drivers/hello:hello_module

      - name: 上传 ko
        uses: actions/upload-artifact@v4
        with:
          name: hello-ko
          # 编译产物位于 bazel-bin 下的对应路径
          path: android-kernel/bazel-bin/common/drivers/hello/hello.ko
