name: Android14-6.1-KO
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 缓存内核源码
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: android-kernel
          key: kernel-android14-6.1

      - name: 安装 repo
        run: |
          sudo curl -s -L https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
          sudo chmod a+x /usr/local/bin/repo

      - name: 拉取 Android14-6.1 内核
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          mkdir -p android-kernel
          cd android-kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android14-6.1 --no-repo-verify --depth=1
          repo sync --force-sync --no-clone-bundle --no-tags -j$(nproc)

      - name: 放入驱动并创建 Bazel 配置
        run: |
          cd android-kernel
          mkdir -p common/drivers/hello
          cp ../hello.c ../Makefile common/drivers/hello/
          
          # 创建 Kbuild
          echo "obj-m += hello.o" > common/drivers/hello/Kbuild

          # 创建 Bazel 需要的 BUILD 文件（修复语法）
          cat <<'EOF' > common/drivers/hello/BUILD
load("//build/kernel/kleaf:kernel.bzl", "kernel_module")

kernel_module(
    name = "hello",
    srcs = glob(["**"]),
    kernel_build = "//common:kernel_aarch64",
    visibility = ["//visibility:public"],
)
EOF

      - name: 只编译 hello.ko 模块
        run: |
          cd android-kernel
          tools/bazel build --config=fast //common/drivers/hello:hello

      - name: 上传 ko
        uses: actions/upload-artifact@v4
        with:
          name: hello-ko
          path: android-kernel/out/android14-6.1/common/drivers/hello/hello.ko
