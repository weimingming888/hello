name: Android14-6.1-KO
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 清理磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: 安装依赖与 repo
        run: |
          sudo curl https://googleapis.com > /usr/local/bin/repo
          sudo chmod a+x /usr/local/bin/repo
          git config --global user.email "you@example.com"
          git config --global user.name "Your Name"

      - name: 拉取 Android14-6.1 内核
        run: |
          mkdir -p android-kernel && cd android-kernel
          repo init -u https://googlesource.com -b common-android14-6.1 --depth=1
          repo sync --force-sync -j$(nproc)

      - name: 放入驱动并创建构建配置
        run: |
          cd android-kernel
          mkdir -p common/drivers/hello
          
          # 1. 拷贝源码
          if [ -f "../hello.c" ]; then
            cp ../hello.c common/drivers/hello/
          fi
          
          # 2. 创建 Kbuild (使用简单 echo)
          echo "obj-m += hello.o" > common/drivers/hello/Kbuild

          # 3. 创建 BUILD 文件 (改用 printf，彻底解决 EOF 语法报错问题)
          printf 'load("//build/kernel/kleaf:kernel.bzl", "kernel_module")\n\n' > common/drivers/hello/BUILD
          printf 'kernel_module(\n' >> common/drivers/hello/BUILD
          printf '    name = "hello_module",\n' >> common/drivers/hello/BUILD
          printf '    srcs = glob(["**"]),\n' >> common/drivers/hello/BUILD
          printf '    outs = ["hello.ko"],\n' >> common/drivers/hello/BUILD
          printf '    kernel_build = "//common:kernel_aarch64",\n' >> common/drivers/hello/BUILD
          printf ')\n' >> common/drivers/hello/BUILD

      - name: 单独编译 ko 文件
        run: |
          cd android-kernel
          # 执行编译
          tools/bazel build --config=fast //common/drivers/hello:hello_module

      - name: 上传 ko
        uses: actions/upload-artifact@v4
        with:
          name: hello-ko
          # 这里的通配符可以自动适配 Bazel 的复杂输出路径
          path: android-kernel/bazel-bin/common/drivers/hello/*.ko
