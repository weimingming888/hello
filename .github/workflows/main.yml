name: Android14-6.1-KO

on:
  workflow_dispatch: # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 驱动代码
        uses: actions/checkout@v4

      - name: 安装 repo
        run: |
          curl https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
          chmod a+x /usr/local/bin/repo

      - name: 拉取 Android14-6.1 内核源码
        run: |
          mkdir -p android-kernel && cd android-kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android14-6.1 --no-repo-verify --depth=1
          repo sync --force-sync --no-clone-bundle --no-tags -j32

      - name: 放入驱动并配置编译
        run: |
          cd android-kernel
          mkdir -p common/drivers
          cp -r ../kerneldriver common/drivers/
          echo "obj-y += kerneldriver/" >> common/drivers/Makefile

      - name: Bazel 编译内核与模块
        run: |
          cd android-kernel
          tools/bazel run //common:kernel_aarch64_dist -- --destdir=out/dist

      - name: 上传 ko 驱动
        uses: actions/upload-artifact@v4
        with:
          name: mydriver-ko
          path: android-kernel/out/android14-6.1/common/drivers/kerneldriver/*.ko
