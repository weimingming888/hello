name: Build Android 15 GKI Module
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出你的代码
        uses: actions/checkout@v4

      - name: 安装基础依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex git libelf-dev libssl-dev

      - name: 获取安卓官方 Clang 工具链
        run: |
          # 必须指向完整的工具链路径
          mkdir -p $GITHUB_WORKSPACE/clang-tools
          git clone https://googlesource.com $GITHUB_WORKSPACE/clang-tools --depth=1

      - name: 获取内核源码 (GKI 6.1)
        run: |
          # 指向完整的内核通用源码路径
          git clone https://googlesource.com $GITHUB_WORKSPACE/common --depth=1 -b android15-6.1

      - name: 编译模块
        run: |
          # 自动定位 Clang 目录并加入环境变量
          CLANG_BIN=$(find $GITHUB_WORKSPACE/clang-tools -name "clang" | head -n 1 | xargs dirname)
          export PATH=$CLANG_BIN:$PATH
          KDIR=$GITHUB_WORKSPACE/common
          
          # 1. 预配置内核
          cd $KDIR
          make ARCH=arm64 LLVM=1 gki_defconfig
          make ARCH=arm64 LLVM=1 prepare modules_prepare

          # 2. 编译模块
          cd $GITHUB_WORKSPACE
          make ARCH=arm64 LLVM=1 CROSS_COMPILE=aarch64-linux-gnu- KDIR=$KDIR
          
      - name: 上传编译好的 KO 文件
        uses: actions/upload-artifact@v4
        with:
          name: hello-module
          path: ./*.ko
